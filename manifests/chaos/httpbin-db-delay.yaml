apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: httpbin-db-delay
  namespace: demo
spec:
  hosts: ["fake-db.demo.svc.cluster.local"]
  http:
  - fault:
      delay:
        percentage: {value: 100}
        fixedDelay: 5s
    route:
    - destination:
        host: fake-db.demo.svc.cluster.local
        port: {number: 8000}
