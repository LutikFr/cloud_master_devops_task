---
- name: Install common packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - jq
      - tar
      - gzip
      - git
      - openssl
      - gettext-base
      - conntrack
      - socat
      - ebtables
      - ethtool
      - apt-transport-https
      - python3-pip
      - python3-kubernetes
      - python3-yaml
      - python3-jmespath
      - acl
    state: present
    update_cache: true

- name: Install Docker engine packages
  ansible.builtin.apt:
    name:
      - docker.io
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add invoking user to docker group
  ansible.builtin.user:
    name: "{{ minikube_user }}"
    groups: docker
    append: true

- name: Allow invoking user to access current Docker socket
  ansible.posix.acl:
    path: /var/run/docker.sock
    entity: "{{ minikube_user }}"
    etype: user
    permissions: rw
    state: present
