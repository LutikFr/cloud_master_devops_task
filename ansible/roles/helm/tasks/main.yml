---
- name: Check installed helm version
  ansible.builtin.command: /usr/local/bin/helm version --short
  register: helm_version_check
  changed_when: false
  failed_when: false

- name: Decide whether helm must be installed or replaced
  ansible.builtin.set_fact:
    helm_needs_install: "{{ helm_version_check.rc != 0 or helm_version not in helm_version_check.stdout }}"

- name: Download Helm archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ binary_arch }}.tar.gz"
    dest: "/tmp/helm-{{ helm_version }}-linux-{{ binary_arch }}.tar.gz"
    mode: "0644"
    timeout: 60
  register: helm_download
  until: helm_download is succeeded
  retries: 5
  delay: 10
  when: helm_needs_install

- name: Extract Helm archive
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ helm_version }}-linux-{{ binary_arch }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: helm_needs_install

- name: Install Helm binary
  ansible.builtin.copy:
    src: /tmp/linux-{{ binary_arch }}/helm
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true
  when: helm_needs_install

- name: Ensure Helm config and cache directories exist
  ansible.builtin.file:
    path: "/home/{{ minikube_user }}/{{ item }}"
    state: directory
    owner: "{{ minikube_user }}"
    group: "{{ minikube_user }}"
    mode: "0755"
  loop:
    - .config/helm
    - .cache/helm/repository

- name: Configure Helm repositories
  ansible.builtin.copy:
    dest: "/home/{{ minikube_user }}/.config/helm/repositories.yaml"
    owner: "{{ minikube_user }}"
    group: "{{ minikube_user }}"
    mode: "0644"
    content: |
      apiVersion: v1
      generated: "2026-01-01T00:00:00Z"
      repositories:
      - name: harbor
        url: https://helm.goharbor.io
        caFile: ""
        certFile: ""
        keyFile: ""
        username: ""
        password: ""
        pass_credentials_all: false
        insecure_skip_tls_verify: false
      - name: istio
        url: https://istio-release.storage.googleapis.com/charts
        caFile: ""
        certFile: ""
        keyFile: ""
        username: ""
        password: ""
        pass_credentials_all: false
        insecure_skip_tls_verify: false
      - name: prometheus-community
        url: https://prometheus-community.github.io/helm-charts
        caFile: ""
        certFile: ""
        keyFile: ""
        username: ""
        password: ""
        pass_credentials_all: false
        insecure_skip_tls_verify: false
      - name: grafana
        url: https://grafana.github.io/helm-charts
        caFile: ""
        certFile: ""
        keyFile: ""
        username: ""
        password: ""
        pass_credentials_all: false
        insecure_skip_tls_verify: false

- name: Download Helm repository indexes
  ansible.builtin.get_url:
    url: "{{ item.url }}/index.yaml"
    dest: "/home/{{ minikube_user }}/.cache/helm/repository/{{ item.name }}-index.yaml"
    owner: "{{ minikube_user }}"
    group: "{{ minikube_user }}"
    mode: "0644"
    timeout: 120
  register: helm_index_download
  until: helm_index_download is succeeded
  retries: 5
  delay: 20
  loop:
    - { name: harbor, url: "https://helm.goharbor.io" }
    - { name: istio, url: "https://istio-release.storage.googleapis.com/charts" }
    - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }
    - { name: grafana, url: "https://grafana.github.io/helm-charts" }
