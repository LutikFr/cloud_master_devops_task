---
- name: Create Harbor namespace with Istio sidecar injection label
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ harbor_namespace }}"
        labels:
          istio-injection: enabled
  become: true
  become_user: "{{ minikube_user }}"

- name: Download Harbor Helm chart from GitHub
  ansible.builtin.get_url:
    url: "https://github.com/goharbor/harbor-helm/archive/refs/tags/v{{ harbor_chart_version }}.tar.gz"
    dest: "/tmp/harbor-helm-{{ harbor_chart_version }}.tar.gz"
    mode: "0644"
    timeout: 120
    force: false
  register: harbor_chart_download
  until: harbor_chart_download is succeeded
  retries: 5
  delay: 20

- name: Extract Harbor Helm chart
  ansible.builtin.unarchive:
    src: "/tmp/harbor-helm-{{ harbor_chart_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/harbor-helm-{{ harbor_chart_version }}/Chart.yaml"

- name: Render Harbor values
  ansible.builtin.template:
    src: harbor-values.yaml.j2
    dest: /tmp/harbor-values.yaml
    owner: "{{ minikube_user }}"
    group: "{{ minikube_user }}"
    mode: "0640"

- name: Install or upgrade Harbor Helm release
  kubernetes.core.helm:
    name: harbor
    chart_ref: "/tmp/harbor-helm-{{ harbor_chart_version }}"
    release_namespace: "{{ harbor_namespace }}"
    create_namespace: false
    values_files:
      - /tmp/harbor-values.yaml
    wait: true
    wait_timeout: 15m
    state: present
  become: true
  become_user: "{{ minikube_user }}"

- name: Apply Harbor Istio gateway
  kubernetes.core.k8s:
    state: present
    template: harbor/gateway-harbor-gateway.yaml.j2
  become: true
  become_user: "{{ minikube_user }}"

- name: Apply Harbor Istio virtual service
  kubernetes.core.k8s:
    state: present
    template: harbor/virtualservice-harbor-route.yaml.j2
  become: true
  become_user: "{{ minikube_user }}"

- name: Print access summary
  ansible.builtin.debug:
    msg:
      - "Minikube cluster is ready."
      - "Demo internal check: kubectl -n demo exec deploy/sleep -c sleep -- curl -sS http://httpbin.demo.svc.cluster.local:8000/status/200"
      - "Harbor admin password: {{ harbor_admin_password }}"
