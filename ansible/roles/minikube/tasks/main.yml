---
- name: Check installed minikube version
  ansible.builtin.command: /usr/local/bin/minikube version --short
  register: minikube_version_check
  changed_when: false
  failed_when: false

- name: Decide whether minikube must be installed or replaced
  ansible.builtin.set_fact:
    minikube_needs_install: "{{ minikube_version_check.rc != 0 or minikube_version not in minikube_version_check.stdout }}"

- name: Download minikube binary
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-{{ binary_arch }}"
    dest: "/tmp/minikube-linux-{{ binary_arch }}"
    mode: "0755"
    timeout: 60
  register: minikube_download
  until: minikube_download is succeeded
  retries: 5
  delay: 10
  when: minikube_needs_install

- name: Install minikube binary
  ansible.builtin.copy:
    src: "/tmp/minikube-linux-{{ binary_arch }}"
    dest: /usr/local/bin/minikube
    mode: "0755"
    remote_src: true
  when: minikube_needs_install

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Kubernetes apt repository key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_minor }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"
    timeout: 60
  register: kubernetes_key_download
  until: kubernetes_key_download is succeeded
  retries: 5
  delay: 10

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_apt_minor }}/deb/ /"
    filename: kubernetes
    state: present
    update_cache: true

- name: Install kubectl
  ansible.builtin.apt:
    name: kubectl
    state: present

- name: Ensure root kube/minikube directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - /root/.kube
    - /root/.minikube


- name: Ensure minikube user kube directories exist
  ansible.builtin.file:
    path: "/home/{{ minikube_user }}/{{ item }}"
    state: directory
    owner: "{{ minikube_user }}"
    group: "{{ minikube_user }}"
    mode: "0755"
    recurse: true
  loop:
    - .kube
    - .minikube

- name: Check minikube status
  ansible.builtin.command: minikube status --format='{{ '{{' }}.Host{{ '}}' }}'
  become: true
  register: minikube_status
  changed_when: false
  failed_when: false

- name: Start minikube single-node cluster
  ansible.builtin.command: >-
    minikube start
    --driver={{ minikube_driver }}
    --kubernetes-version={{ kubernetes_version }}
    --cpus={{ minikube_cpus }}
    --memory={{ minikube_memory }}
    --disk-size={{ minikube_disk_size }}
    --addons=default-storageclass,storage-provisioner
  become: true
  environment:
    HOME: /root
    MINIKUBE_HOME: /root
    KUBECONFIG: /root/.kube/config
  when: minikube_status.rc != 0 or 'Running' not in minikube_status.stdout

- name: Wait for Kubernetes nodes to become Ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  become: true
  register: node_info
  until:
    - node_info.resources | length > 0
    - node_info.resources | json_query('[*].status.conditions[?type==`Ready`].status | [0]') | unique == ['True']
  retries: 30
  delay: 10
