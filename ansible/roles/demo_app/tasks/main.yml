---
- name: Apply demo namespace
  kubernetes.core.k8s:
    state: present
    src: "{{ repo_root }}/manifests/apps/demo/namespace-demo.yaml"
  become: true

- name: Apply httpbin deployment
  kubernetes.core.k8s:
    state: present
    src: "{{ repo_root }}/manifests/apps/demo/deployment-httpbin.yaml"
  become: true

- name: Apply httpbin service
  kubernetes.core.k8s:
    state: present
    src: "{{ repo_root }}/manifests/apps/demo/service-httpbin.yaml"
  become: true

- name: Apply sleep deployment
  kubernetes.core.k8s:
    state: present
    src: "{{ repo_root }}/manifests/apps/demo/deployment-sleep.yaml"
  become: true

- name: Apply fake-db service
  kubernetes.core.k8s:
    state: present
    src: "{{ repo_root }}/manifests/apps/demo/service-fake-db.yaml"
  become: true

- name: Wait for httpbin deployment to be available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ demo_namespace }}"
    name: httpbin
  become: true
  register: httpbin_deploy
  until:
    - httpbin_deploy.resources | length == 1
    - (httpbin_deploy.resources[0].status.availableReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Wait for sleep deployment to be available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ demo_namespace }}"
    name: sleep
  become: true
  register: sleep_deploy
  until:
    - sleep_deploy.resources | length == 1
    - (sleep_deploy.resources[0].status.availableReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Apply demo Istio gateway
  kubernetes.core.k8s:
    state: present
    template: demo/gateway-demo-gateway.yaml.j2
  become: true

- name: Apply demo Istio virtual service
  kubernetes.core.k8s:
    state: present
    template: demo/virtualservice-httpbin-route.yaml.j2
  become: true
