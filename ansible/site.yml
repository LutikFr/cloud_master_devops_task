---
- name: Install single-node Kubernetes with Minikube, Istio, Harbor and demo app
  hosts: local
  gather_facts: true
  become: true
  environment:
    HOME: /root
    MINIKUBE_HOME: /root
    KUBECONFIG: /root/.kube/config
  roles:
    - workspace
    - common
    - minikube
    - helm
    - istio
    - demo_app
    - harbor
    - monitoring
